server {
    listen 80;
    server_name _; # Change this to your domain if applicable (e.g., example.com)

    # Logging
    access_log /var/log/nginx/finprince_access.log;
    error_log /var/log/nginx/finprince_error.log;

    # Serve Frontend (Vite Static Files)
    location / {
        root /home/ubuntu/finprince/frontend/dist; # Path to built React/Vite assets
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy Backend API requests to Django Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Prevent timeout for long-running AI tasks
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Proxy Django Admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve Django Static Files
    location /static/ {
        alias /home/ubuntu/finprince/backend/staticfiles/; # Ensure this matches your STATIC_ROOT
    }

    # Serve Django Media Files
    location /media/ {
        alias /home/ubuntu/finprince/backend/media/; # Ensure this matches your MEDIA_ROOT
    }

    # Server-Sent Events (SSE) Proxy setup (Important for AI pipelines)
    location /api/ocr-status-stream/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }
}
