server {
    listen 80;
    server_name finpixe.com www.finpixe.com;

    # Certbot challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Force all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name finpixe.com www.finpixe.com;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/finpixe.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finpixe.com/privkey.pem;

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dashboard App
    location /dashboard/ {
        proxy_pass http://frontend:80/dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect /dashboard to /dashboard/
    location = /dashboard {
        return 301 https://$host/dashboard/;
    }

    # Admin Panel
    location /admin/ {
        proxy_pass http://admin-panel:80/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect /admin to /admin/
    location = /admin {
        return 301 https://$host/admin/;
    }

    # Landing Page (Root)
    location / {
        proxy_pass http://landing-page:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
