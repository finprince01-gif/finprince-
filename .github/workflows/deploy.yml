name: CD - Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to project folder
            cd ~/finpixe-automation/testing--main || mkdir -p ~/finpixe-automation/testing--main && cd ~/finpixe-automation/testing--main
            
            # 2. Pull latest code
            git pull origin main

            # 3. Restore Environment Variables
            echo "${{ secrets.ENV_FILE_CONTENT }}" > backend/.env
            
            # 4. Rebuild and Restart Containers
            sudo docker-compose -f docker-compose.prod.yml up --build -d

            # 5. Clean up unused images to save disk space
            sudo docker image prune -f
