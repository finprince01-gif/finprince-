version: '3.8'

services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-ai_accounting}
      MYSQL_USER: ${DB_USER:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - db_data:/var/lib/mysql

  proxysql:
    image: proxysql/proxysql:2.5.5
    restart: always
    ports:
      - "6033:6033"  # Traffic port
      - "6032:6032"  # Admin port
    volumes:
      - ./proxysql.cnf:/etc/proxysql.cnf
    depends_on:
      - db


  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "8000:8000"


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  landing-page:
    build:
      context: "./finpixe landing page"
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"

volumes:
  db_data:
