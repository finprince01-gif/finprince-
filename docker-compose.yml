version: '3.8'

services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-Finpixe_AI_Accounting}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Ulaganathan123}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-Finpixe_AI_Accounting}
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-Ulaganathan123}
      - REDIS_URL=redis://redis:6379/1
      - DJANGO_SECRET=${DJANGO_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
      - VITE_PORT=${VITE_PORT:-5173}
    depends_on:
      - backend

volumes:
  mysql_data:
  static_volume:
  media_volume:
