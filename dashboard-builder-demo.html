<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Builder - Standalone Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .widget-item {
            cursor: grab;
        }

        .widget-item:active {
            cursor: grabbing;
        }

        .canvas-grid {
            background-image: radial-gradient(circle, #e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .resize-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #3b82f6;
            border: 2px solid white;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }

        .widget:hover .resize-handle {
            opacity: 1;
        }

        .resize-handle.se {
            bottom: -6px;
            right: -6px;
            cursor: nwse-resize;
        }

        .resize-handle.sw {
            bottom: -6px;
            left: -6px;
            cursor: nesw-resize;
        }

        .resize-handle.ne {
            top: -6px;
            right: -6px;
            cursor: nesw-resize;
        }

        .resize-handle.nw {
            top: -6px;
            left: -6px;
            cursor: nwse-resize;
        }
    </style>
</head>

<body class="bg-gray-50 overflow-hidden">
    <div id="app" class="flex flex-col h-screen">
        <!-- Top Navigation -->
        <div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="9" rx="1" stroke-width="1.5" />
                    <rect x="14" y="3" width="7" height="5" rx="1" stroke-width="1.5" />
                    <rect x="14" y="12" width="7" height="9" rx="1" stroke-width="1.5" />
                    <rect x="3" y="16" width="7" height="5" rx="1" stroke-width="1.5" />
                </svg>
                <h1 class="text-xl font-bold text-gray-800">Dashboard Builder</h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="saveDashboard()"
                    class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                    </svg>
                    Save
                </button>
                <button onclick="resetDashboard()"
                    class="flex items-center gap-2 px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 text-sm font-medium">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Reset
                </button>
                <button onclick="toggleFullScreen()"
                    class="flex items-center gap-2 px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 text-sm font-medium">
                    <svg id="fullscreen-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                    </svg>
                    <span id="fullscreen-text">Full Screen</span>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex flex-1 overflow-hidden">
            <!-- Canvas Area -->
            <div class="flex-1 overflow-auto p-6">
                <div id="canvas"
                    class="relative min-h-full bg-white rounded-lg border-2 border-dashed border-gray-300 shadow-inner canvas-grid">
                    <div id="empty-state"
                        class="absolute inset-0 flex items-center justify-center text-gray-400 pointer-events-none">
                        <div class="text-center">
                            <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <rect x="3" y="3" width="7" height="9" rx="1" stroke-width="1.5" />
                                <rect x="14" y="3" width="7" height="5" rx="1" stroke-width="1.5" />
                                <rect x="14" y="12" width="7" height="9" rx="1" stroke-width="1.5" />
                                <rect x="3" y="16" width="7" height="5" rx="1" stroke-width="1.5" />
                            </svg>
                            <p class="text-lg font-medium">Drag widgets from the sidebar to get started</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Sidebar -->
            <div id="sidebar"
                class="w-80 bg-white border-l border-gray-200 shadow-lg overflow-y-auto transition-all duration-300">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h2 class="text-lg font-bold text-gray-800">Widget Library</h2>
                    <p class="text-xs text-gray-500 mt-1">Drag widgets to the canvas</p>
                </div>

                <div class="p-4 space-y-6">
                    <!-- Charts Category -->
                    <div>
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">Charts</h3>
                        <div class="space-y-2">
                            <div class="widget-item flex items-center gap-3 p-3 bg-gray-50 border border-gray-200 rounded-lg hover:bg-blue-50 hover:border-blue-300 transition-all"
                                draggable="true" data-type="bar-chart" data-title="Bar Chart">
                                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                                </svg>
                                <span class="text-sm font-medium text-gray-700">Bar Chart</span>
                            </div>
                            <div class="widget-item flex items-center gap-3 p-3 bg-gray-50 border border-gray-200 rounded-lg hover:bg-blue-50 hover:border-blue-300 transition-all"
                                draggable="true" data-type="pie-chart" data-title="Pie Chart">
                                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
                                </svg>
                                <span class="text-sm font-medium text-gray-700">Pie Chart</span>
                            </div>
                            <div class="widget-item flex items-center gap-3 p-3 bg-gray-50 border border-gray-200 rounded-lg hover:bg-blue-50 hover:border-blue-300 transition-all"
                                draggable="true" data-type="line-chart" data-title="Line Chart">
                                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />
                                </svg>
                                <span class="text-sm font-medium text-gray-700">Line Chart</span>
                            </div>
                        </div>
                    </div>

                    <!-- Data Category -->
                    <div>
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">Data</h3>
                        <div class="space-y-2">
                            <div class="widget-item flex items-center gap-3 p-3 bg-gray-50 border border-gray-200 rounded-lg hover:bg-blue-50 hover:border-blue-300 transition-all"
                                draggable="true" data-type="data-table" data-title="Data Table">
                                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                </svg>
                                <span class="text-sm font-medium text-gray-700">Data Table</span>
                            </div>
                        </div>
                    </div>

                    <!-- Content Category -->
                    <div>
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">Content</h3>
                        <div class="space-y-2">
                            <div class="widget-item flex items-center gap-3 p-3 bg-gray-50 border border-gray-200 rounded-lg hover:bg-blue-50 hover:border-blue-300 transition-all"
                                draggable="true" data-type="text-block" data-title="Text Block">
                                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                                <span class="text-sm font-medium text-gray-700">Text Block</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let widgets = [];
        let widgetCounter = 0;
        let draggedElement = null;
        let dragOffset = { x: 0, y: 0 };
        let isFullScreen = false;

        const canvas = document.getElementById('canvas');
        const emptyState = document.getElementById('empty-state');

        // Widget templates
        const widgetTemplates = {
            'bar-chart': { width: 400, height: 300 },
            'pie-chart': { width: 350, height: 350 },
            'line-chart': { width: 450, height: 300 },
            'data-table': { width: 500, height: 350 },
            'text-block': { width: 350, height: 200 }
        };

        // Drag from sidebar
        document.querySelectorAll('.widget-item').forEach(item => {
            item.addEventListener('dragstart', (e) => {
                e.dataTransfer.effectAllowed = 'copy';
                e.dataTransfer.setData('widget-type', e.target.dataset.type);
                e.dataTransfer.setData('widget-title', e.target.dataset.title);
            });
        });

        // Drop on canvas
        canvas.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
        });

        canvas.addEventListener('drop', (e) => {
            e.preventDefault();
            const type = e.dataTransfer.getData('widget-type');
            const title = e.dataTransfer.getData('widget-title');

            if (type && widgetTemplates[type]) {
                const rect = canvas.getBoundingClientRect();
                const template = widgetTemplates[type];
                const x = Math.max(0, snapToGrid(e.clientX - rect.left - template.width / 2));
                const y = Math.max(0, snapToGrid(e.clientY - rect.top - template.height / 2));

                addWidget(type, title, x, y, template.width, template.height);
            }
        });

        function snapToGrid(value, gridSize = 20) {
            return Math.round(value / gridSize) * gridSize;
        }

        function addWidget(type, title, x, y, width, height) {
            const id = `widget-${++widgetCounter}`;
            widgets.push({ id, type, title, x, y, width, height });
            renderWidgets();
        }

        function renderWidgets() {
            // Clear existing widgets
            const existingWidgets = canvas.querySelectorAll('.widget');
            existingWidgets.forEach(w => w.remove());

            // Show/hide empty state
            emptyState.style.display = widgets.length > 0 ? 'none' : 'flex';

            // Render all widgets
            widgets.forEach(widget => {
                const el = createWidgetElement(widget);
                canvas.appendChild(el);
            });
        }

        function createWidgetElement(widget) {
            const div = document.createElement('div');
            div.className = 'widget absolute bg-white rounded-lg shadow-lg border-2 border-gray-200 hover:border-blue-300 transition-all';
            div.style.left = widget.x + 'px';
            div.style.top = widget.y + 'px';
            div.style.width = widget.width + 'px';
            div.style.height = widget.height + 'px';
            div.dataset.id = widget.id;

            div.innerHTML = `
                <div class="flex items-center justify-between px-4 py-2 border-b border-gray-200 bg-gray-50 rounded-t-lg cursor-grab active:cursor-grabbing" onmousedown="startDrag(event, '${widget.id}')">
                    <span class="text-sm font-semibold text-gray-700">${widget.title}</span>
                    <button onclick="deleteWidget('${widget.id}')" class="p-1 hover:bg-red-100 rounded transition-colors">
                        <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="h-[calc(100%-44px)] overflow-hidden p-4">
                    ${getWidgetContent(widget.type)}
                </div>
                <div class="resize-handle se" onmousedown="startResize(event, '${widget.id}', 'se')"></div>
                <div class="resize-handle sw" onmousedown="startResize(event, '${widget.id}', 'sw')"></div>
                <div class="resize-handle ne" onmousedown="startResize(event, '${widget.id}', 'ne')"></div>
                <div class="resize-handle nw" onmousedown="startResize(event, '${widget.id}', 'nw')"></div>
            `;

            return div;
        }

        function getWidgetContent(type) {
            switch (type) {
                case 'bar-chart':
                    return '<div class="flex items-end justify-around h-full gap-2"><div class="bg-blue-500 rounded-t flex-1" style="height: 65%"></div><div class="bg-blue-500 rounded-t flex-1" style="height: 45%"></div><div class="bg-blue-500 rounded-t flex-1" style="height: 80%"></div><div class="bg-blue-500 rounded-t flex-1" style="height: 55%"></div><div class="bg-blue-500 rounded-t flex-1" style="height: 70%"></div></div>';
                case 'pie-chart':
                    return '<div class="flex items-center justify-center h-full"><div class="w-32 h-32 rounded-full bg-gradient-to-br from-blue-500 via-purple-500 to-pink-500"></div></div>';
                case 'line-chart':
                    return '<svg class="w-full h-full" viewBox="0 0 400 200"><polyline points="0,150 80,100 160,120 240,60 320,80 400,40" fill="none" stroke="#3b82f6" stroke-width="3"/></svg>';
                case 'data-table':
                    return '<table class="w-full text-sm"><thead><tr class="border-b border-gray-200"><th class="text-left py-2 px-3">Name</th><th class="text-left py-2 px-3">Value</th><th class="text-left py-2 px-3">Status</th></tr></thead><tbody><tr class="border-b border-gray-100"><td class="py-2 px-3">Item 1</td><td class="py-2 px-3">$100</td><td class="py-2 px-3"><span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs">Active</span></td></tr></tbody></table>';
                case 'text-block':
                    return '<div><h3 class="text-lg font-semibold text-gray-800 mb-2">Text Block</h3><p class="text-gray-600 text-sm">This is a customizable text block.</p></div>';
                default:
                    return '<div class="flex items-center justify-center h-full text-gray-400">Widget Content</div>';
            }
        }

        function startDrag(e, widgetId) {
            e.preventDefault();
            const widget = widgets.find(w => w.id === widgetId);
            if (!widget) return;

            const widgetEl = document.querySelector(`[data-id="${widgetId}"]`);
            const rect = widgetEl.getBoundingClientRect();

            draggedElement = widget;
            dragOffset = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };

            document.addEventListener('mousemove', handleDrag);
            document.addEventListener('mouseup', stopDrag);
        }

        function handleDrag(e) {
            if (!draggedElement) return;

            const rect = canvas.getBoundingClientRect();
            const x = snapToGrid(Math.max(0, e.clientX - rect.left - dragOffset.x));
            const y = snapToGrid(Math.max(0, e.clientY - rect.top - dragOffset.y));

            draggedElement.x = x;
            draggedElement.y = y;

            const widgetEl = document.querySelector(`[data-id="${draggedElement.id}"]`);
            if (widgetEl) {
                widgetEl.style.left = x + 'px';
                widgetEl.style.top = y + 'px';
            }
        }

        function stopDrag() {
            draggedElement = null;
            document.removeEventListener('mousemove', handleDrag);
            document.removeEventListener('mouseup', stopDrag);
        }

        // Resize functionality
        let resizingWidget = null;
        let resizeHandle = null;
        let resizeStartPos = { x: 0, y: 0 };
        let resizeStartSize = { width: 0, height: 0, x: 0, y: 0 };

        function startResize(e, widgetId, handle) {
            e.preventDefault();
            e.stopPropagation();

            const widget = widgets.find(w => w.id === widgetId);
            if (!widget) return;

            resizingWidget = widget;
            resizeHandle = handle;
            resizeStartPos = { x: e.clientX, y: e.clientY };
            resizeStartSize = {
                width: widget.width,
                height: widget.height,
                x: widget.x,
                y: widget.y
            };

            document.addEventListener('mousemove', handleResize);
            document.addEventListener('mouseup', stopResize);
        }

        function handleResize(e) {
            if (!resizingWidget) return;

            const deltaX = e.clientX - resizeStartPos.x;
            const deltaY = e.clientY - resizeStartPos.y;

            let newWidth = resizeStartSize.width;
            let newHeight = resizeStartSize.height;
            let newX = resizeStartSize.x;
            let newY = resizeStartSize.y;

            // Calculate new dimensions based on handle
            switch (resizeHandle) {
                case 'se': // Southeast - bottom right
                    newWidth = Math.max(200, snapToGrid(resizeStartSize.width + deltaX));
                    newHeight = Math.max(150, snapToGrid(resizeStartSize.height + deltaY));
                    break;
                case 'sw': // Southwest - bottom left
                    newWidth = Math.max(200, snapToGrid(resizeStartSize.width - deltaX));
                    newHeight = Math.max(150, snapToGrid(resizeStartSize.height + deltaY));
                    newX = snapToGrid(resizeStartSize.x + deltaX);
                    if (newWidth === 200) newX = resizeStartSize.x; // Don't move if at min width
                    break;
                case 'ne': // Northeast - top right
                    newWidth = Math.max(200, snapToGrid(resizeStartSize.width + deltaX));
                    newHeight = Math.max(150, snapToGrid(resizeStartSize.height - deltaY));
                    newY = snapToGrid(resizeStartSize.y + deltaY);
                    if (newHeight === 150) newY = resizeStartSize.y; // Don't move if at min height
                    break;
                case 'nw': // Northwest - top left
                    newWidth = Math.max(200, snapToGrid(resizeStartSize.width - deltaX));
                    newHeight = Math.max(150, snapToGrid(resizeStartSize.height - deltaY));
                    newX = snapToGrid(resizeStartSize.x + deltaX);
                    newY = snapToGrid(resizeStartSize.y + deltaY);
                    if (newWidth === 200) newX = resizeStartSize.x;
                    if (newHeight === 150) newY = resizeStartSize.y;
                    break;
            }

            // Update widget
            resizingWidget.width = newWidth;
            resizingWidget.height = newHeight;
            resizingWidget.x = newX;
            resizingWidget.y = newY;

            // Update DOM
            const widgetEl = document.querySelector(`[data-id="${resizingWidget.id}"]`);
            if (widgetEl) {
                widgetEl.style.width = newWidth + 'px';
                widgetEl.style.height = newHeight + 'px';
                widgetEl.style.left = newX + 'px';
                widgetEl.style.top = newY + 'px';
            }
        }

        function stopResize() {
            resizingWidget = null;
            resizeHandle = null;
            document.removeEventListener('mousemove', handleResize);
            document.removeEventListener('mouseup', stopResize);
        }

        function deleteWidget(widgetId) {
            widgets = widgets.filter(w => w.id !== widgetId);
            renderWidgets();
        }

        function saveDashboard() {
            const data = JSON.stringify(widgets, null, 2);
            console.log('Dashboard saved:', data);
            alert('Dashboard configuration saved to console!');
        }

        function resetDashboard() {
            if (confirm('Are you sure you want to reset the dashboard?')) {
                widgets = [];
                renderWidgets();
            }
        }

        function toggleFullScreen() {
            isFullScreen = !isFullScreen;
            const app = document.getElementById('app');
            const icon = document.getElementById('fullscreen-icon');
            const text = document.getElementById('fullscreen-text');

            if (isFullScreen) {
                app.classList.add('fixed', 'inset-0', 'z-50');
                text.textContent = 'Exit';
            } else {
                app.classList.remove('fixed', 'inset-0', 'z-50');
                text.textContent = 'Full Screen';
            }
        }
    </script>
</body>

</html>
